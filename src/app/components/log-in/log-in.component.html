<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="rounded">
  <div id="login">
    <form (ngSubmit)="login()">
      <h2>Log In to your account</h2>
      <br>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Username:</label>
          <input name="userName" type="text" class="form-control" id="userName" aria-describedby="emailHelp" [(ngModel)]="userName">
        </div>
        <br>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password:</label>
          <input name="passWord" type="password" class="form-control" id="passWord" [(ngModel)]="passWord">
        </div>
        <br>
        <button type="submit" class="btn">Log In</button>
        <br>
        <a [routerLink]="['/register']">Don't have an account, register now!</a>
      </form>
  </div>
</body>
</html>
